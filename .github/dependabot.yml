version: 2
updates:
  - package-ecosystem: bundler
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      # Agrupa todos os patch e minor numa unica PR semanal.
      # Majors continuam em PRs separadas pra revisao individual.
      bundler-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - patch
          - minor

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      actions-minor-and-patch:
        patterns:
          - "*"
        update-types:
          - patch
          - minor
